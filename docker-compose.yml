services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: statsig_db
    environment:
      POSTGRES_DB: ${DB_NAME:-statsig_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - statsig_network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statsig_backend
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-statsig_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - statsig_network

  # TypeScript Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: statsig_frontend
    environment:
      DJANGO_API_URL: http://backend:8000
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - statsig_network

  redis:
    image: redis:7-alpine
    container_name: statsig_redis
    ports:
    - "6379:6379"
    volumes:
    - redis_data:/data
    healthcheck: 
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - statsig_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statsig_celery_worker
    command: celery -A app worker -l info
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - statsig_network

volumes:
  postgres_data:
  redis_data:

networks:
  statsig_network:
    driver: bridge
